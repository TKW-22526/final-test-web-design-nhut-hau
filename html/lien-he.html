            LIÊN HỆ

            <!-- FORM -->
            <div class="col-md-7">

                <form>

                    <div class="mb-3">
                        <label class="form-label">
                            Họ và tên
                        </label>

                               class="form-control"
                               placeholder="Nhập họ tên">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Email
                        </label>

                               class="form-control"

                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Số điện thoại
                        </label>

                        <input type="text"
                               class="form-control"
                               placeholder="Nhập số điện thoại">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Nội dung
                        </label>

                        <textarea class="form-control"
                                  rows="5"
                                  placeholder="Nhập nội dung liên hệ"></textarea>
                    </div>

                    <button type="submit"
                            class="btn btn-primary">
                        Gửi liên hệ
                    </button>

                </form>
