<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Gà Rán Hàn Quốc</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="../index.html">Trang chủ</a>
                <a class="nav-link" href="san-pham.html">Sản phẩm</a>
                <a class="nav-link" href="gioi-thieu.html">Giới thiệu</a>
                <a class="nav-link" href="lien-he.html">Liên hệ</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5" id="detail-container">
        <div class="card shadow-sm p-4 bg-white rounded">
            <div class="row align-items-center">
                
                <div class="col-md-6 text-center mb-4 mb-md-0">
                    <img id="detail-img" src="../assets/logo.jpg" alt="Hình ảnh sản phẩm" class="img-fluid rounded shadow-sm object-fit-cover" style="max-height: 400px; width: 100%;">
                </div>
                
                <div class="col-md-6">
                    <small id="detail-id" class="text-muted text-uppercase fw-bold d-block mb-1"></small>
                    <h1 id="detail-name" class="fw-bold text-dark mb-2">Đang tải tên món ăn...</h1>
                    <h3 id="detail-price" class="text-danger fw-bold mb-4">0 đ</h3>
                    
                    <hr>
                    
                    <h5 class="fw-bold text-secondary">Mô tả sản phẩm:</h5>
                    <p id="detail-desc" class="text-muted lh-base" style="text-align: justify;"></p>
                    
                    <div class="mt-4 d-flex gap-3">
                        <a href="san-pham.html" class="btn btn-secondary px-4">
                            ← Quay lại danh sách
                        </a>
                        <button class="btn btn-success px-4" onclick="buyNow()">
                            Đặt mua ngay
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="text-center text-white bg-dark py-3 mt-auto">
        <div class="container">
            <small>&copy; 2026 Gà Rán Hàn Quốc - Hệ Thống Quản Lý Thực Đơn</small>
        </div>
    </footer>

    <script>
        window.onload = function() {
            // 1. Lấy mã 'id' từ URL thanh địa chỉ (?id=02)
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            // 2. Lấy mảng danh sách sản phẩm hiện tại từ localStorage về
            const productList = JSON.parse(localStorage.getItem("products")) || [];

            // 3. Tìm sản phẩm cụ thể trùng với ID vừa lấy
            const product = productList.find(p => p.id === productId);

            // 4. Nếu tồn tại sản phẩm, tiến hành đổ dữ liệu động lên giao diện
            if (product) {
                document.getElementById("detail-name").innerText = product.name;
                document.getElementById("detail-price").innerText = product.price.toLocaleString('vi-VN') + " đ";
                document.getElementById("detail-img").src = product.image;
                document.getElementById("detail-id").innerText = "Mã sản phẩm: " + product.id;
                
                // Gán mô tả riêng biệt của từng món ăn vào đây
                document.getElementById("detail-desc").innerText = product.description || "Món ăn ngon miệng, chuẩn bị sạch sẽ, đảm bảo vệ sinh an toàn thực phẩm.";
                
                document.getElementById("detail-img").alt = product.name;
                document.title = product.name + " - Chi Tiết Sản Phẩm";
            } else {
                // Hiển thị giao diện thông báo lỗi nếu không bắt được dữ liệu ID
                document.getElementById("detail-container").innerHTML = `
                    <div class="alert alert-danger text-center my-5 p-5" role="alert">
                        <h4 class="alert-heading fw-bold">Món ăn này không tồn tại!</h4>
                        <p class="mb-4">Dữ liệu món ăn không tồn tại trong hệ thống bộ nhớ LocalStorage.</p>
                        <a href="san-pham.html" class="btn btn-danger">Quay lại danh sách sản phẩm</a>
                    </div>
                `;
            }
        };

        function buyNow() {
            alert("Đã ghi nhận món ăn vào hệ thống đặt hàng!");
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
