<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Gà Rán Hàn Quốc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-warning" href="../index.html">🍗 GÀ RÁN HÀN QUỐC</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="../index.html">Trang chủ</a>
            <a class="nav-link active" href="#">Sản phẩm</a>
            <a class="nav-link" href="gioi-thieu.html">Giới thiệu</a>
            <a class="nav-link" href="lien-he.html">Liên hệ</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="text-center mb-4 fw-bold text-uppercase text-success">Thực Đơn Món Ăn</h2>

    <div class="mb-4">
        <input type="text" id="search" class="form-control p-2 shadow-sm border-0" 
               placeholder="🔍 Tìm kiếm món ăn bạn muốn mua..." onkeyup="searchProduct()">
    </div>

    <div class="row" id="product-list"></div>

    <div class="card shadow-sm border-0 mt-5 mb-5" id="cart-section">
        <div class="card-header bg-success text-white fw-bold d-flex justify-content-between align-items-center py-3">
            <span>🛒 GIỎ HÀNG CỦA BẠN</span>
            <button class="btn btn-sm btn-outline-light fw-bold" onclick="clearCart()">Xóa toàn bộ giỏ hàng</button>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-center">
                        <tr>
                            <th style="width: 5%;">STT</th>
                            <th style="width: 15%;">Hình ảnh</th>
                            <th>Tên món ăn</th>
                            <th style="width: 15%;">Giá</th>
                            <th style="width: 12%;">Số lượng</th>
                            <th style="width: 15%;">Tổng cộng</th>
                            <th style="width: 10%;">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="cart-list">
                        </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center bg-white p-3 border-top">
            <h5 class="mb-0 text-secondary">Tổng tiền cần trả: <span id="cart-total-price" class="text-danger fw-bold fs-4">0 đ</span></h5>
            <button class="btn btn-danger btn-lg px-5 fw-bold shadow-sm" onclick="checkoutCart()">💳 THANH TOÁN NGAY</button>
        </div>
    </div>
</div>

<script src="../js/script.js"></script>
</body>
</html>
